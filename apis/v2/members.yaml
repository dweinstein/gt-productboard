 team","example":"123e4567-e89b-12d3-a456-426614174000"},"type":{"type":"string","const":"team","description":"Target entity type","example":"team"},"links":{"$ref":"#/components/schemas/ResourceLinks"}}},"ObfuscatedValue":{"type":"string","enum":["[obfuscated]"],"description":"The value `[obfuscated]`. Used to hide personally identifiable information in cases the request doesn't have the required `members_pii:read` OAuth2 scope.\n","example":"[obfuscated]"},"Email":{"type":"string","maxLength":256,"description":"The email of a Productboard user that has access to your workspace.","example":"email@example.com"},"ResourceLinks":{"type":"object","required":["self"],"properties":{"self":{"type":"string"}}},"ListLinks":{"type":"object","required":["next"],"properties":{"next":{"type":["string","null"]}}},"ErrorSource":{"type":"object","description":"An object containing references to the source of the error. I helps with location of the problematic field or parameter.\n","properties":{"pointer":{"type":"string","description":"JSON Pointer [RFC6901] to the associated entity in the request document.\n","example":"/data/fields/status"},"parameter":{"type":"string","description":"Query parameter causing the error.\nUsed when the error is related to a query parameter rather than request body.\n","example":"pageCursor"}}},"Error":{"type":"object","description":"Individual error object containing the details and context.\n","required":["code","title","detail"],"properties":{"code":{"type":"string","description":"A unique, machine-readable and stable code that identifies this error.\nMust be consistent across all services and provide clear categorization.\nFormat: `category.subcategory.specificError`\n","examples":["access.denied","entity.not.found"]},"title":{"type":"string","description":"A short, human-readable summary of the problem that doesn't change\nfrom occurrence to occurrence of the problem. Should provide immediate\nunderstanding of the error type.\n","maxLength":255,"example":"Missing required field"},"detail":{"type":"string","description":"A human-readable explanation specific to this occurrence of the problem.\nMay include suggestions for resolution but should not expose sensitive information.\n","maxLength":1000,"example":"Field 'status' is required."},"source":{"$ref":"#/components/schemas/ErrorSource"}}},"ErrorResponse":{"type":"object","description":"Standard error response structure for all endpoints.\n","required":["id","errors"],"properties":{"id":{"type":"string","description":"A unique identifier for this specific occurrence of the problem.\nIt carries unique request/response ID which allows client\nand server to reference the exact instance of the error\nin logs or support communication.\n"},"errors":{"type":"array","description":"Array of error objects, multiple errors can be returned.","items":{"$ref":"#/components/schemas/Error"},"minItems":1}}}},"responses":{"MemberListResponse":{"description":"A paginated list of members","content":{"application/json":{"schema":{"type":"object","properties":{"data":{"type":"array","items":{"$ref":"#/components/schemas/Member"}},"links":{"$ref":"#/components/schemas/ListLinks"}}},"examples":{"membersList":{"summary":"List of members","value":{"data":[{"id":"123e4567-e89b-12d3-a456-426614174000","type":"member","fields":{"name":"John Doe","username":"johndoe","email":"john.doe@example.com","role":"admin","disabled":false,"invitationPending":false},"links":{"self":"https://api.productboard.com/v2/members/123e4567-e89b-12d3-a456-426614174000"}},{"id":"223e4567-e89b-12d3-a456-426614174001","type":"member","fields":{"name":"Jane Smith","username":"janesmith","email":"jane.smith@example.com","role":"maker","disabled":false,"invitationPending":false},"links":{"self":"https://api.productboard.com/v2/members/223e4567-e89b-12d3-a456-426614174001"}}],"links":{"next":"https://api.productboard.com/v2/members?pageCursor=next_cursor_value"}}},"membersListObfuscated":{"summary":"List of memb