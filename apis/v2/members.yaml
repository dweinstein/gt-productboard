{"openapi":"3.1.1","info":{"title":"Members","description":"TBD","version":"2.0.0","contact":{"name":"Productboard Support","url":"https://support.productboard.com","email":"support@productboard.com"},"license":{"name":"Productboard Proprietary","url":"https://www.productboard.com/"}},"servers":[{"url":"https://api.productboard.com/v2","description":"Production server"}],"security":[{"BearerAuth":[]},{"OAuth2":["entities:read","write:entities","entities:delete"]}],"paths":{"/members":{"get":{"tags":["members"],"summary":"List members","description":"Retrieves a paginated list of members from your workspace.\nMembers represent users who have access to your Productboard workspace.\n\n- Members are sorted by creation date, oldest first.\n- Use the `query` parameter to search by name or email (case-insensitive, partial match).\n- Use the `roles[]` parameter to filter by role(s). Multiple roles use OR logic (e.g., `roles[]=admin&roles[]=maker`).\n- Use the `includeDisabled` parameter to include disabled members in the response.\n- Use the `includeInvited` parameter to include invited members with pending invitations.\n- Use the `pageCursor` parameter to paginate through results.\n\n> Without the `members_pii:read` OAuth scope, PII fields (`name`, `username`, `email`) are returned as `[obfuscated]`.\n","operationId":"listMembers","security":[{"BearerAuth":["members:read"]}],"parameters":[{"name":"pageCursor","in":"query","description":"Cursor for pagination.","required":false,"schema":{"type":"string"}},{"name":"query","in":"query","description":"Full-text search query. Performs case-insensitive partial match on member name or email.\n","required":false,"schema":{"type":"string","minLength":1,"maxLength":255},"example":"john"},{"name":"roles[]","in":"query","description":"Filter members by role(s). Use multiple `roles[]` parameters to match members\nwith any of the specified roles (OR logic).\n\nExamples:\n- Single role: `roles[]=admin`\n- Multiple roles: `roles[]=admin&roles[]=maker`\n","required":false,"schema":{"type":"array","items":{"type":"string","enum":["admin","maker","viewer","contributor"]}},"style":"form","explode":true,"examples":{"single_role":{"summary":"Filter by single role","value":["admin"]},"multiple_roles":{"summary":"Filter by multiple roles (OR logic)","value":["admin","maker"]}}},{"name":"includeDisabled","in":"query","description":"Include disabled members in the response. By default, disabled members are excluded.\n","required":false,"schema":{"type":"boolean","default":false},"example":true},{"name":"includeInvitationPending","in":"query","description":"Include members with pending invitations in the response. By default, members with pending invitations are excluded.\n","required":false,"schema":{"type":"boolean","default":false},"example":true},{"name":"includeInvited","in":"query","deprecated":true,"description":"**Deprecated**: Use `includeInvitationPending` instead.\nInclude members with pending invitations in the response. By default, members with pending invitations are excluded.\n","required":false,"schema":{"type":"boolean","default":false},"example":true}],"responses":{"200":{"$ref":"#/components/responses/MemberListResponse"},"400":{"$ref":"#/components/responses/BadRequestResponse"},"401":{"$ref":"#/components/responses/UnauthorizedResponse"},"403":{"$ref":"#/components/responses/ForbiddenResponse"},"408":{"$ref":"#/components/responses/RequestTimeoutResponse"},"429":{"$ref":"#/components/responses/TooManyRequestsResponse"},"500":{"$ref":"#/components/responses/InternalServerErrorResponse"}}}},"/members/{id}":{"get":{"tags":["members"],"summary":"Get member","description":"Retrieves the full details of a specific member by their unique identifier (UUID).\nReturns the member's profile information including name, username, email address, and workspace role.\n\n> Without the `members_pii:read` OAuth scope, PII fields (`name`, `username`, `email`) are returned as `[obfuscated]`.\n","operationId":"getMember","security":[{"BearerAuth":["members:read"]}],"parameters":[{"name":"id","in":"path","required":true,"description":"UUID of the member","schema":{"type":"string","format":"uuid","example":"123e4567-e89b-12d3-a456-426614174000"}}],"responses":{"200":{"$ref":"#/components/responses/MemberResponse"},"401":{"$ref":"#/components/responses/UnauthorizedResponse"},"403":{"$ref":"#/components/responses/ForbiddenResponse"},"404":{"$ref":"#/components/responses/NotFoundResponse"},"408":{"$ref":"#/components/responses/RequestTimeoutResponse"},"429":{"$ref":"#/components/responses/TooManyRequestsResponse"},"500":{"$ref":"#/components/responses/InternalServerErrorResponse"}}}},"/members/{id}/relationships":{"get":{"tags":["members"],"summary":"List member teams","operationId":"getMemberRelationships","security":[{"BearerAuth":["members:read"]}],"description":"Retrieves all teams that a specific member belongs to.\nReturns a paginated list of team membership relationships representing the member's team associations.\n\nUse the `pageCursor` parameter to paginate through results when the member belongs to many teams.\n\n## Relationship Direction\n\nThis endpoint returns the inverse view of team memberships. While `/v2/teams/{id}/relationships`\nshows which members belong to a team, this endpoint shows which teams a member belongs to.\n","parameters":[{"name":"id","in":"path","required":true,"description":"UUID of the member","schema":{"type":"string","format":"uuid","example":"123e4567-e89b-12d3-a456-426614174000"}},{"name":"pageCursor","in":"query","description":"Cursor for pagination through member's teams","required":false,"schema":{"type":"string"}}],"responses":{"200":{"description":"List of team memberships for the member","content":{"application/json":{"schema":{"type":"object","properties":{"data":{"type":"array","items":{"$ref":"#/components/schemas/MemberTeamRelationship"}},"links":{"type":"object","properties":{"next":{"type":["string","null"],"description":"URL to the next page of teams. Null when all teams are returned.\n"}}}}},"examples":{"member_teams":{"summary":"Member's team memberships list","value":{"data":[{"type":"team_membership","target":{"id":"123e4567-e89b-12d3-a456-426614174000","type":"team","links":{"self":"https://api.productboard.com/v2/teams/123e4567-e89b-12d3-a456-426614174000"}}},{"type":"team_membership","target":{"id":"223e4567-e89b-12d3-a456-426614174001","type":"team","links":{"self":"https://api.productboard.com/v2/teams/223e4567-e89b-12d3-a456-426614174001"}}}],"links":{"next":null}}},"empty_memberships":{"summary":"Member belongs to no teams","value":{"data":[],"links":{"next":null}}}}}}},"400":{"$ref":"#/components/responses/BadRequestResponse"},"401":{"$ref":"#/components/responses/UnauthorizedResponse"},"403":{"$ref":"#/components/responses/ForbiddenResponse"},"404":{"$ref":"#/components/responses/NotFoundResponse"},"408":{"$ref":"#/components/responses/RequestTimeoutResponse"},"429":{"$ref":"#/components/responses/TooManyRequestsResponse"},"500":{"$ref":"#/components/responses/InternalServerErrorResponse"}}}}},"components":{"securitySchemes":{"BearerAuth":{"type":"http","scheme":"bearer","bearerFormat":"JWT","description":"API token authentication. Use your API token as the value of the Authorization header"},"OAuth2":{"type":"oauth2","description":"OAuth 2.0 authentication. Use this for user-authorized access to Productboard API.","flows":{"authorizationCode":{"authorizationUrl":"https://app.productboard.com/oauth/authorize","tokenUrl":"https://app.productboard.com/oauth/token","scopes":{"entities:read":"Read access to entities (features, components, initiatives, etc.)","write:entities":"Write access to create and modify entities","entities:delete":"Delete entities"}}}}},"schemas":{"Member":{"type":"object","description":"Represents a member (user) in the workspace.\n","required":["id","type","fields","links"],"properties":{"id":{"type":"string","format":"uuid","description":"Unique identi