{"openapi":"3.1.1","info":{"version":"2.0.0","title":"Productboard API v2 - Analytics","termsOfService":"https://www.productboard.com/msa/","description":"API for retrieving analytics data about product usage with optional date filtering and pagination.\n","license":{"name":"Productboard Proprietary","url":"https://www.productboard.com/"},"contact":{"name":"Productboard Support","url":"https://support.productboard.com","email":"support@productboard.com"}},"servers":[{"url":"https://api.productboard.com/v2","description":"Production server"}],"security":[{"BearerAuth":[]},{"OAuth2":["analytics:read"]}],"paths":{"/analytics/member-activities":{"get":{"summary":"Retrieve member activity data","description":"Retrieves member activity data with optional date filtering and pagination.\nReturns a list of member activity records.\n","operationId":"getMembersActivity","parameters":[{"name":"dateFrom","in":"query","required":false,"schema":{"type":"string","format":"date"},"description":"Start date for filtering activity data (ISO 8601 format)","example":"2025-10-01"},{"name":"dateTo","in":"query","required":false,"schema":{"type":"string","format":"date"},"description":"End date for filtering activity data (ISO 8601 format)","example":"2025-10-31"},{"name":"limit","in":"query","required":false,"schema":{"type":"integer","minimum":1,"maximum":1000,"default":100},"description":"Maximum number of records to return","example":100},{"name":"pageCursor","in":"query","required":false,"schema":{"type":"string"},"description":"Cursor for pagination to get the next page of results"}],"responses":{"200":{"description":"Successful response with member activity data","content":{"application/json":{"schema":{"type":"object","required":["data"],"properties":{"data":{"type":"array","items":{"$ref":"#/components/schemas/MemberActivityPayload"}},"links":{"type":"object","properties":{"next":{"oneOf":[{"type":"string","format":"uri","example":"http://api.productboard.com/member-activities?page