ber of features created by the member on this date","example":1},"insightCreatedCount":{"type":"integer","minimum":0,"description":"Number of insights created by the member on this date","example":4},"noteCreatedCount":{"type":"integer","minimum":0,"description":"Number of notes created by the member on this date","example":7},"productCreatedCount":{"type":"integer","minimum":0,"description":"Number of products created by the member on this date","example":1},"subfeatureCreatedCount":{"type":"integer","minimum":0,"description":"Number of subfeatures created by the member on this date","example":2},"noteStateChangedCount":{"type":"integer","minimum":0,"description":"Number of note state changes by the member on this date","example":3},"gridBoardCreatedCount":{"type":"integer","minimum":0,"description":"Number of grid/prioritization boards created by the member on this date","example":1},"timelineBoardCreatedCount":{"type":"integer","minimum":0,"description":"Number of timeline roadmap boards created by the member on this date","example":1},"insightsBoardCreatedCount":{"type":"integer","minimum":0,"description":"Number of insights boards created by the member on this date","example":1},"documentBoardCreatedCount":{"type":"integer","minimum":0,"description":"Number of document boards created by the member on this date","example":1},"columnBoardCreatedCount":{"type":"integer","minimum":0,"description":"Number of column roadmap boards created by the member on this date","example":1},"gridBoardOpenedCount":{"type":"integer","minimum":0,"description":"Number of grid/prioritization boards opened by the member on this date","example":5},"timelineBoardOpenedCount":{"type":"integer","minimum":0,"description":"Number of timeline boards opened by the member on this date","example":4},"insightsBoardOpenedCount":{"type":"integer","minimum":0,"description":"Number of insights/inbox/analytics boards opened by the member on this date","example":3},"documentBoardOpenedCount":{"type":"