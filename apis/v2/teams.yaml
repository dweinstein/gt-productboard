Response"},"400":{"$ref":"#/components/responses/BadRequestResponse"},"401":{"$ref":"#/components/responses/UnauthorizedResponse"},"403":{"$ref":"#/components/responses/ForbiddenResponse"},"404":{"$ref":"#/components/responses/NotFoundResponse"},"408":{"$ref":"#/components/responses/RequestTimeoutResponse"},"429":{"$ref":"#/components/responses/TooManyRequestsResponse"},"500":{"$ref":"#/components/responses/InternalServerErrorResponse"}}},"patch":{"tags":["teams"],"summary":"Update team","description":"Updates the fields of an existing team.\nOnly the fields included in the request body will be updated. Fields not provided will remain unchanged.\n\n## Updatable Fields\n\n- `name`: The name of the team (1-255 characters)\n- `handle`: Unique handle for @mentions (lowercase alphanumeric only)\n- `description`: Optional description of the team (max 10,000 characters)\n\n## Response\n\nReturns a reference to the updated team.\nUse the GET endpoint to retrieve the full updated team details.\n","operationId":"updateTeamById","security":[{"BearerAuth":["teams:write"]}],"parameters":[{"name":"id","in":"path","required":true,"description":"UUID of the team","schema":{"type":"string","format":"uuid","example":"123e4567-e89b-12d3-a456-426614174000"}}],"requestBody":{"$ref":"#/components/requestBodies/TeamUpdateRequestBody"},"responses":{"200":{"$ref":"#/components/responses/TeamReferenceResponse"},"400":{"$ref":"#/components/responses/BadRequestResponse"},"401":{"$ref":"#/components/responses/UnauthorizedResponse"},"403":{"$ref":"#/components/responses/ForbiddenResponse"},"404":{"$ref":"#/components/responses/NotFoundResponse"},"408":{"$ref":"#/components/responses/RequestTimeoutResponse"},"409":{"$ref":"#/components/responses/ConflictResponse"},"422":{"$ref":"#/components/responses/UnprocessableEntityResponse"},"429":{"$ref":"#/components/responses/TooManyRequestsResponse"},"500":{"$ref":"#/components/responses/InternalServerErrorResponse"}}},"delete":{"tags":["teams"],"summar