{"openapi":"3.1.1","info":{"title":"Teams","description":"TBD","version":"2.0.0","contact":{"name":"Productboard Support","url":"https://support.productboard.com","email":"support@productboard.com"},"license":{"name":"Productboard Proprietary","url":"https://www.productboard.com/"}},"servers":[{"url":"https://api.productboard.com/v2","description":"Production server"}],"security":[{"BearerAuth":[]},{"OAuth2":["entities:read","write:entities","entities:delete"]}],"paths":{"/teams":{"get":{"tags":["teams"],"summary":"List teams","description":"Retrieves a paginated list of teams from your workspace.\nTeams represent groups of members that can be used for organizing work and assigning ownership.\n\n- Teams are sorted by creation date, newest first.\n- Use the `name` parameter to filter by exact name match.\n- Use the `query` parameter to search by partial name (case-insensitive). For example, `query=product` will match \"Product Team\", \"My Product\", \"production\", etc.\n- Use the `pageCursor` parameter to paginate through results.\n","operationId":"listTeams","security":[{"BearerAuth":["teams:read"]}],"parameters":[{"name":"pageCursor","in":"query","description":"Cursor for pagination.","required":false,"schema":{"type":"string"}},{"name":"name","in":"query","description":"Filter teams by exact name match.\n","required":false,"schema":{"type":"string","minLength":1,"maxLength":255},"example":"Product Team"},{"name":"query","in":"query","description":"Full-text search query. Performs case-insensitive partial match on team name.\n","required":false,"schema":{"type":"string","minLength":1,"maxLength":255},"example":"Product"}],"responses":{"200":{"$ref":"#/components/responses/TeamListResponse"},"400":{"$ref":"#/components/responses/BadRequestResponse"},"401":{"$ref":"#/components/responses/UnauthorizedResponse"},"403":{"$ref":"#/components/responses/ForbiddenResponse"},"408":{"$ref":"#/components/responses/RequestTimeoutResponse"},"429":{"$ref":"#/components/response