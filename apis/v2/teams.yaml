:["string","null"],"description":"URL to the next page of team members. Null when all members are returned.\n"}}}}},"examples":{"team_members":{"summary":"Team members list","value":{"data":[{"type":"team_membership","target":{"id":"123e4567-e89b-12d3-a456-426614174000","type":"member","links":{"self":"https://api.productboard.com/v2/members/123e4567-e89b-12d3-a456-426614174000"}}},{"type":"team_membership","target":{"id":"223e4567-e89b-12d3-a456-426614174001","type":"member","links":{"self":"https://api.productboard.com/v2/members/223e4567-e89b-12d3-a456-426614174001"}}}],"links":{"next":null}}}}}}},"400":{"$ref":"#/components/responses/BadRequestResponse"},"401":{"$ref":"#/components/responses/UnauthorizedResponse"},"403":{"$ref":"#/components/responses/ForbiddenResponse"},"404":{"$ref":"#/components/responses/NotFoundResponse"},"408":{"$ref":"#/components/responses/RequestTimeoutResponse"},"429":{"$ref":"#/components/responses/TooManyRequestsResponse"},"500":{"$ref":"#/components/responses/InternalServerErrorResponse"}}},"post":{"tags":["teams"],"summary":"Add team member","operationId":"createTeamRelationship","security":[{"BearerAuth":["teams:write"]}],"description":"Adds a member to a team.\nThe target member must be an existing member of the current workspace.\n\n## Constraints\n\n- A member can only be added to a team once (duplicate memberships return a `409 Conflict` error).\n- Only **admin** and **maker** roles can add members to teams.\n","parameters":[{"name":"id","in":"path","required":true,"description":"UUID of the team","schema":{"type":"string","format":"uuid","example":"123e4567-e89b-12d3-a456-426614174000"}}],"requestBody":{"$ref":"#/components/requestBodies/TeamMemberCreateRequestBody"},"responses":{"201":{"description":"Team member added successfully","content":{"application/json":{"schema":{"type":"object","properties":{"data":{"$ref":"#/components/schemas/TeamMemberRelationship"}}},"examples":{"member_added":{"summary":"Member added to team","value":{"data":{"type":"team_membership","target":{"id":"123e4567-e89b-12d3-a456-426614174000","type":"member","links":{"self":"https://api.productboard.com/v2/members/123e4567-e89b-12d3-a456-426614174000"}}}}}}}}},"400":{"$ref":"#/components/responses/BadRequestResponse"},"401":{"$ref":"#/components/responses/UnauthorizedResponse"},"403":{"$ref":"#/components/responses/ForbiddenResponse"},"404":{"$ref":"#/components/responses/NotFoundResponse"},"408":{"$ref":"#/components/responses/RequestTimeoutResponse"},"409":{"$ref":"#/components/responses/ConflictResponse"},"422":{"$ref":"#/components/responses/UnprocessableEntityResponse"},"429":{"$ref":"#/components/responses/TooManyRequestsResponse"},"500":{"$ref":"#/components/responses/InternalServerErrorResponse"}}}},"/teams/{id}/relationships/member/{targetId}":{"delete":{"tags":["teams"],"summary":"Delete team member","operationId":"deleteTeamRelationship","security":[{"BearerAuth":["teams:write"]}],"description":"Removes a member from a team.\nThis only removes the team membership association — it does not delete the member from the workspace.\n\n## Constraints\n\n- If the member is not a member of the team, a `404` error is returned.\n- Only **admin** and **maker** roles can remove members from teams.\n","parameters":[{"name":"id","in":"path","required":true,"description":"UUID of the team","schema":{"type":"string","format":"uuid","example":"123e4567-e89b-12d3-a456-426614174000"}},{"name":"targetId","in":"path","required":true,"description":"UUID of the member (space membership) to remove from the team","schema":{"type":"string","format":"uuid","example":"223e4567-e89b-12d3-a456-426614174001"}}],"responses":{"204":{"$ref":"#/components/responses/NoContentResponse"},"401":{"$ref":"#/components/responses/UnauthorizedResponse"},"403":{"$ref":"#/components/responses/ForbiddenResponse"},"404":{"$ref":"#/components/responses/NotFoundResponse"},"408":{"$ref":"#/components/responses/RequestTimeoutResponse"},"422":{"$ref":"#/components/responses/UnprocessableEntityResponse"},"429":{"$ref":"#/components/responses/TooManyRequestsResponse"},"500":{"$ref":"#/components/responses/InternalServerErrorResponse"}}}}},"components":{"securitySchemes":{"BearerAuth":{"type":"http","scheme":"bearer","bearerFormat":"JWT","description":"API token authentication. Use your API token as the value of the Authorization header"},"OAuth2":{"type":"oauth2","description":"OAuth 2.0 authentication. Use this for user-authorized access to Productboard API.","flows":{"authorizationCode":{"authorizationUrl":"https://app.productboard.com/oauth/authorize","tokenUrl":"https://app.productboard.com/oauth/token","scopes":{"entities:read":"Read access to entities (features, components, initiatives, etc.)","write:entities":"Write access to create and modify entities","entities:delete":"Delete entities"}}}}},"schemas":{"TeamReference":{"type":"object","description":"Minimal reference to a team resource containing only identifying information.\n","required":["id","type","links"],"properties":{"id":{"type":"string","format":"uuid","description":"Unique identifier of the team","example":"123e4567-e89b-12d3-a456-426614174000"},"type":{"type":"string","const":"team","description":"Resource type identifier","example":"team"},"links":{"$ref":"#/components/schemas/ResourceLinks"}}},"TeamReferenceResponse":{"type":"object","description":"Response wrapper containing a team reference.\n","required":["data"],"properties":{"data":{"$ref":"#/components/schemas/TeamReference"}}},"Team":{"description":"Full team resource with all fields and metadata.\n","allOf":[{"$ref":"#/components/schemas/TeamReference"},{"type":"object","required":["fields","createdAt","updatedAt"],"properties":{"fields":{"$ref":"#/components/schemas/TeamFields"},"createdAt":{"type":"string","format":"date-time","description":"ISO 8601 timestamp when the team was created","example":"2025-01-01T10:00:00Z"},"updatedAt":{"type":"string","format":"date-time","description":"ISO 8601 timestamp when the team was last updated","example":"2025-01-15T14:30:00Z"}}}]},"TeamFields":{"type":"object","description":"Fields of a team resource.\n","required":["name","handle"],"properties":{"name":{"type":"string","minLength":1,"maxLength":255,"description":"The name of the team.\n","example":"Product Team"},"handle":{"type":"string","description":"Unique handle for @mentions. Lowercase alphanumeric only.\n","example":"productteam"},"description":{"type":"string","description":"Optional description of the team.\n","example":"Team responsible for product development"},"avatarUrl":{"type":["string","null"],"format":"uri","readOnly":true,"description":"URL of the team's avatar image. Read-only.\nReturns `null` if no avatar is set.\n","example":"https://cdn.productboard.com/teams/avatars/123/medium.png"}}},"TeamCreateOrUpdateFields":{"type":"object","description":"Fields for creating or updating a team.\nFor creation, `name` and `handle` are required.\nFor updates, the `fields` object is required but all individual field properties within it are optional.\n\n**Note:** `avatarUrl` is read-only and cannot be set via API. Avatar management is only available through the UI.\n","properties":{"name":{"type":"string","minLength":1,"maxLength":255,"description":"The name of the team.\n\n# Validation\n- Required for creation\n- Must be between 1 and 255 characters\n- Must be unique per workspace\n\n# Filtering\nSupports exact match via `name` parameter and partial match via `query` parameter on GET /v2/teams.\n","example":"Product Team"},"handle":{"type":"string","minLength":1,"maxLength":255,"pattern":"^[a-z0-9]+$","description":"Unique handle for @mentions.\n\n# Validation\n- Required for creation\n- Lowercase letters and numbers only (no uppercase, spaces, or special characters)\n- Must be unique per workspace\n","example":"productteam"},"description":{"type":"string","maxLength":10000,"description":"Optional description of the team.\n\n# Validation\n- Optional field\n- Maximum length: 10000 characters\n","example":"Team responsible for product development"}}},"TeamMemberRelationship":{"type":"object","description":"Represents a team membership relationship connecting a team to a member.\n","required":["type","target"],"properties":{"type":{"type":"string","const":"team_membership","description":"Relationship type identifier","example":"team_membership"},"target":{"$ref":"#/components/schemas/TeamMemberTarget"}}},"TeamMemberTarget":{"type":"object","description":"Target reference for a team member relationship.\n","required":["id","type","links"],"properties":{"id":{"type":"string","format":"uuid","description":"UUID of the member (space membership)","example":"123e4567-e89b-12d3-a456-426614174000"},"type":{"type":"string","const":"member","description":"Target entity type","example":"member"},"links":{"$ref":"#/components/schemas/ResourceLinks"}}},"TeamMemberCreatePayload":{"type":"object","description":"Payload for adding a member to a team.\n","required":["type","target"],"properties":{"type":{"type":"string","const":"team_membership","description":"Relationship type (must be \"team_membership\")","example":"team_membership"},"target":{"type":"object","required":["id","type"],"properties":{"id":{"type":"string","format":"uuid","description":"UUID of the member (space membership) to add to the team","example":"123e4567-e89b-12d3-a456-426614174000"},"type":{"type":"string","const":"member","description":"Target entity type (must be \"member\")","example":"member"}}}}},"ResourceLinks":{"type":"object","required":["self"],"properties":{"self":{"type":"string"}}},"ListLinks":{"type":"object","required":["next"],"properties":{"next":{"type":["string","null"]}}},"ErrorSource":{"type":"object","description":"An object containing references to the source of the error. I helps with location of the problematic field or parameter.\n","properties":{"pointer":{"type":"string","description":"JSON Pointer [RFC6901] to the associat